<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed Dodda | Professional Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #ffffff;
            --accent: #3498db; /* Sleek Blue */
            --text-main: #e0e0e0;
            --text-sub: #a0a0a0;
            --bg-dark: #0f1113;
            --card-bg: rgba(25, 28, 32, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            perspective: 1200px;
        }

        /* Hide scrollbar but keep functionality */
        body::-webkit-scrollbar {
            display: none;
        }
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Ambient Background Gradients */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(52, 152, 219, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(44, 62, 80, 0.3) 0%, transparent 40%);
            filter: blur(80px);
            animation: moveGlow 20s infinite alternate;
        }

        @keyframes moveGlow {
            from { transform: scale(1); }
            to { transform: scale(1.1) translate(2%, 2%); }
        }

        /* --- Main Professional Card --- */
        .master-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 3.5rem;
            display: flex;
            flex-direction: row;
            gap: 3.5rem;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.5);
            max-width: 950px;
            width: 90%;
            position: relative;
            transition: transform 0.1s ease-out;
        }

        /* Left Section */
        .card-left {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 300px;
            text-align: left;
        }

        /* Right Section */
        .card-right {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
            flex: 1;
            justify-content: center;
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            color: var(--primary);
            margin-bottom: 0.8rem;
            line-height: 1;
        }

        .role-tag {
            font-size: 0.9rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 700;
            margin-bottom: 1rem;
            display: block;
        }

        .bio {
            color: var(--text-sub);
            line-height: 1.7;
            font-size: 1.05rem;
        }

        /* --- Social Dock --- */
        .social-dock {
            display: flex;
            gap: 1rem;
        }

        .social-dock a {
            font-size: 1.2rem;
            color: var(--text-main);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
        }

        .social-dock a:hover {
            color: #fff;
            background: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3);
        }

        /* --- Tech Stack --- */
        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
        }

        .skill-pill {
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-main);
            border: 1px solid var(--glass-border);
            transition: 0.3s;
        }
        
        .skill-pill:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
        }

        /* --- Stats --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            border-top: 1px solid var(--glass-border);
            padding-top: 2rem;
        }

        .stat-box { text-align: left; }

        .stat-val {
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--primary);
            display: block;
        }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-sub);
        }

        /* Status Badge */
        .status-badge {
            background: rgba(39, 174, 96, 0.1);
            color: #2ecc71;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(46, 204, 113, 0.2);
            margin-bottom: 1.5rem;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #2ecc71;
            border-radius: 50%;
            box-shadow: 0 0 10px #2ecc71;
        }

        @media (max-width: 850px) {
            body {
                overflow-y: auto;
            }
            /* Hide scrollbar on card but keep scrolling */
            .master-card::-webkit-scrollbar {
                display: none;
            }
            .master-card {
                -ms-overflow-style: none;
                scrollbar-width: none;
                flex-direction: column;
                padding: 2rem;
                text-align: center;
                overflow-y: auto;
                max-height: 90vh;
            }
            .card-left { text-align: center; min-width: 100%; }
            .card-right { overflow-y: visible; }
            .social-dock, .skills-container { justify-content: center; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            h1 { font-size: 2.5rem; }
            .status-badge { margin: 0 auto 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="master-card" id="card">
        <div class="card-left">
            <div class="status-badge">
                <div class="dot"></div> Open for new and better opportunities
            </div>

            <div class="header">
                <span class="role-tag">Human</span>
                <h1>Mohamed Hashem</h1>
                <p class="bio">
                    [YOUR BIO]
                </p>
            </div>
        </div>

        <div class="card-right">
            <div class="skills-container">
                <span class="skill-pill">Photoghraphy</span>
                <span class="skill-pill">[SKILL 2]</span>
                <span class="skill-pill">[SKILL 3]</span>
                <span class="skill-pill">[SKILL 4]</span>
            </div>

            <div class="social-dock">
               <a href="https://github.com/mohameddodda" target="_blank"><i class="fab fa-github"></i></a>
               <a href="https://www.instagram.com/mohameddodda_" target="_blank"><i class="fab fa-instagram"></i></a>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <span class="stat-val">[NUMBER]</span>
                    <span class="stat-label">[LABEL]</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val">[NUMBER]</span>
                    <span class="stat-label">[LABEL]</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val">[NUMBER]</span>
                    <span class="stat-label">[LABEL]</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val">[NUMBER]</span>
                    <span class="stat-label">[LABEL]</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');
        const motionMax = 5; 

        document.addEventListener('mousemove', (e) => {
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const dx = (e.clientX - cx) / cx;
            const dy = (e.clientY - cy) / cy;

            card.style.transform = `rotateY(${dx * motionMax}deg) rotateX(${-dy * motionMax}deg)`;
        });
    </script>
</body>
</html>
